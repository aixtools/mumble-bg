name: Deploy mumble-bg (Dev)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_DEV_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HETZNER_DEV_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy code via rsync
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '.venv/' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.HETZNER_DEV_USER }}@${{ secrets.HETZNER_DEV_HOST }}:/home/cube/mumble-bg/"

      - name: Write environment file
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.HETZNER_DEV_USER }}@${{ secrets.HETZNER_DEV_HOST }}" << 'EOF'
          mkdir -p /home/cube/.env
          cat > /home/cube/.env/mumble-bg << 'ENVFILE'
          PILOT_DATABASE_NAME=${{ secrets.PILOT_DATABASE_NAME }}
          PILOT_DATABASE_HOST=${{ secrets.PILOT_DATABASE_HOST }}
          PILOT_DATABASE_USER=${{ secrets.PILOT_DATABASE_USER }}
          PILOT_DATABASE_PASSWORD=${{ secrets.PILOT_DATABASE_PASSWORD }}
          MMBL_BG_DATABASE_NAME=${{ secrets.MMBL_BG_DATABASE_NAME }}
          MMBL_BG_DATABASE_HOST=${{ secrets.MMBL_BG_DATABASE_HOST }}
          MMBL_BG_DATABASE_USER=${{ secrets.MMBL_BG_DATABASE_USER }}
          MMBL_BG_DATABASE_PASSWORD=${{ secrets.MMBL_BG_DATABASE_PASSWORD }}
          BG_ENGINE=${{ secrets.BG_ENGINE }}
          ENVFILE
          chmod 600 /home/cube/.env/mumble-bg
          EOF

      - name: Install runtime dependencies
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.HETZNER_DEV_USER }}@${{ secrets.HETZNER_DEV_HOST }}" << 'EOF'
          mkdir -p /home/cube/.venv
          if [ ! -d /home/cube/.venv/mumble-bg ]; then
            python3 -m venv /home/cube/.venv/mumble-bg
          fi
          /home/cube/.venv/mumble-bg/bin/pip install --quiet -r /home/cube/mumble-bg/requirements.txt
          set -a
          source /home/cube/.env/mumble-bg
          set +a
          /home/cube/.venv/mumble-bg/bin/python /home/cube/mumble-bg/manage.py migrate --noinput
          EOF

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.HETZNER_DEV_USER }}@${{ secrets.HETZNER_DEV_HOST }}" \
            "sudo systemctl restart mumble-bg-auth"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.HETZNER_DEV_USER }}@${{ secrets.HETZNER_DEV_HOST }}" \
            "systemctl is-active mumble-bg-auth"
