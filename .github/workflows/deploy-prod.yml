name: Deploy mumble-bg (Prod)

on:
  workflow_dispatch:
    inputs:
      deploy_target_name:
        description: 'Secret name containing deploy target JSON (host/user/key/port)'
        required: false
        default: 'MUMBLE_PROD_US'
      env_secret_name:
        description: 'Secret name containing env config JSON (DATABASES/ICE/PSK)'
        required: false
        default: 'MUMBLE_PROD_US_ENV'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET_NAME: ${{ github.event.inputs.deploy_target_name || 'MUMBLE_PROD_US' }}
      ENV_SECRET_NAME: ${{ github.event.inputs.env_secret_name || 'MUMBLE_PROD_US_ENV' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deploy target
        env:
          DEPLOY_TARGET_JSON: ${{ secrets[github.event.inputs.deploy_target_name || 'MUMBLE_PROD_US'] }}
          DEPLOY_ENV_JSON: ${{ secrets[github.event.inputs.env_secret_name || 'MUMBLE_PROD_US_ENV'] }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          python3 - <<'PY'
          import json
          import os
          from json import JSONDecodeError
          from pathlib import Path

          def _parse_target_payload(raw: str, target_name: str) -> dict:
              try:
                  payload = json.loads(raw)
              except JSONDecodeError:
                  # Common operator input mistake: literal newlines in "key" JSON string.
                  key_field = '"key"'
                  key_index = raw.find(key_field)
                  if key_index < 0:
                      raise
                  colon_index = raw.find(':', key_index + len(key_field))
                  if colon_index < 0:
                      raise
                  quote_start = raw.find('"', colon_index + 1)
                  if quote_start < 0:
                      raise

                  i = quote_start + 1
                  while i < len(raw):
                      if raw[i] == '"' and raw[i - 1] != '\\':
                          break
                      i += 1
                  if i >= len(raw):
                      raise

                  key_raw = raw[quote_start + 1:i]
                  key_escaped = (
                      key_raw
                      .replace('\\', '\\\\')
                      .replace('\r', '\\r')
                      .replace('\n', '\\n')
                      .replace('\t', '\\t')
                  )
                  repaired = raw[:quote_start + 1] + key_escaped + raw[i:]
                  payload = json.loads(repaired)

              if not isinstance(payload, dict):
                  raise SystemExit(f"Secret {target_name} must be a JSON object")
              return payload

          target_name = os.environ.get("DEPLOY_TARGET_NAME", "").strip()
          raw = os.environ.get("DEPLOY_TARGET_JSON", "").strip()
          if not target_name:
              raise SystemExit("DEPLOY_TARGET_NAME is empty")
          if not raw:
              raise SystemExit(
                  f"Missing deploy target secret payload for {target_name}. "
                  f"Create a secret named {target_name} with JSON fields host/user/key."
              )

          payload = _parse_target_payload(raw, target_name)

          # Parse env config secret.
          env_secret_name = os.environ.get("ENV_SECRET_NAME", "").strip()
          env_raw = os.environ.get("DEPLOY_ENV_JSON", "").strip()
          if not env_raw:
              raise SystemExit(
                  f"Missing env config secret payload for {env_secret_name}. "
                  f"Create a secret named {env_secret_name} with JSON fields DATABASES/ICE/MURMUR_CONTROL_PSK."
              )
          try:
              env_payload = json.loads(env_raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"Secret {env_secret_name} is not valid JSON: {exc}") from exc
          if not isinstance(env_payload, dict):
              raise SystemExit(f"Secret {env_secret_name} must be a JSON object")

          host = str(payload.get("host", "")).strip()
          user = str(payload.get("user", "")).strip()
          key = payload.get("key", "")
          home_dir = str(payload.get("home_dir", "")).strip()
          project_dir = str(payload.get("project_dir", "")).strip()
          env_file = str(payload.get("env_file", "")).strip()
          venv_dir = str(payload.get("venv_dir", "")).strip()
          service_name = str(payload.get("service_name", "")).strip()
          port = str(payload.get("port", "22")).strip()
          if not port:
              port = "22"

          if not host:
              raise SystemExit(f"Secret {target_name} missing required field: host")
          if not user:
              raise SystemExit(f"Secret {target_name} missing required field: user")
          if not isinstance(key, str) or not key.strip():
              raise SystemExit(f"Secret {target_name} missing required field: key")

          if not home_dir:
              home_dir = f"/home/{user}"
          if not project_dir:
              project_dir = f"{home_dir}/mumble-bg"
          if not env_file:
              env_file = f"{home_dir}/.env/mumble-bg"
          if not venv_dir:
              venv_dir = f"{home_dir}/.venv/mumble-bg"
          if not service_name:
              service_name = "mumble-bg-auth"

          key_path = Path.home() / ".ssh" / "deploy_key"
          key_path.write_text(key.replace("\\n", "\n").rstrip() + "\n", encoding="utf-8")
          key_path.chmod(0o600)

          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as fh:
              fh.write(f"DEPLOY_TARGET_HOST={host}\n")
              fh.write(f"DEPLOY_TARGET_USER={user}\n")
              fh.write(f"DEPLOY_TARGET_PORT={port}\n")
              fh.write(f"DEPLOY_HOME_DIR={home_dir}\n")
              fh.write(f"DEPLOY_PROJECT_DIR={project_dir}\n")
              fh.write(f"DEPLOY_ENV_FILE={env_file}\n")
              fh.write(f"DEPLOY_VENV_DIR={venv_dir}\n")
              fh.write(f"DEPLOY_SERVICE_NAME={service_name}\n")

          # Write env file content locally for scp to remote.
          env_file_local = Path("/tmp/mumble-bg.env")
          lines = []
          for k in ["DATABASES", "ICE", "MURMUR_PROBE", "BG_ENGINE",
                     "BG_RESET_DB_ON_DEPLOY", "MURMUR_CONTROL_PSK"]:
              v = env_payload.get(k)
              if v is None or v == "":
                  continue
              v = str(v)
              # Quote values that contain spaces or special chars.
              if any(c in v for c in " '\"\t\n{}[]"):
                  lines.append(f"{k}='{v}'")
              else:
                  lines.append(f"{k}={v}")
          env_file_local.write_text("\n".join(lines) + "\n", encoding="utf-8")
          env_file_local.chmod(0o600)
          PY

      - name: Set up SSH known hosts
        run: |
          set -euo pipefail
          ssh-keyscan -p "${DEPLOY_TARGET_PORT}" -H "${DEPLOY_TARGET_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy code via rsync
        run: |
          set -euo pipefail
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.env' \
            --exclude '.venv/' \
            -e "ssh -p ${DEPLOY_TARGET_PORT} -i ~/.ssh/deploy_key" \
            ./ "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}:${DEPLOY_PROJECT_DIR%/}/"

      - name: Write environment file
        run: |
          set -euo pipefail
          DEPLOY_ENV_DIR="$(dirname "${DEPLOY_ENV_FILE}")"
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "mkdir -p '${DEPLOY_ENV_DIR}'"
          scp -P "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key \
            /tmp/mumble-bg.env \
            "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}:${DEPLOY_ENV_FILE}"
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "chmod 600 '${DEPLOY_ENV_FILE}'"

      - name: Bootstrap (first deploy)
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_PROJECT_DIR='${DEPLOY_PROJECT_DIR}' DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' DEPLOY_VENV_DIR='${DEPLOY_VENV_DIR}' DEPLOY_SERVICE_NAME='${DEPLOY_SERVICE_NAME}' bash -s" <<'EOF'
          set -euo pipefail

          # Skip bootstrap if the systemd service already exists.
          if sudo systemctl list-unit-files "${DEPLOY_SERVICE_NAME}.service" 2>/dev/null | grep -q "${DEPLOY_SERVICE_NAME}"; then
            echo "[bootstrap] Service ${DEPLOY_SERVICE_NAME} already installed; skipping bootstrap."
            exit 0
          fi

          echo "[bootstrap] First deploy detected — running bootstrap."

          # Install system packages.
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 python3-venv

          # Detect DB engine from env file and install client.
          set -a
          source "${DEPLOY_ENV_FILE}"
          set +a
          BG_ENGINE_EFFECTIVE="${BG_ENGINE:-postgres}"
          case "$(printf '%s' "${BG_ENGINE_EFFECTIVE}" | tr '[:upper:]' '[:lower:]')" in
            ''|postgres|postgresql|psql)
              sudo apt-get install -y -qq postgresql-client
              ;;
            mysql|maria|mariadb)
              sudo apt-get install -y -qq default-mysql-client
              ;;
          esac

          # Create venv if missing.
          mkdir -p "$(dirname "${DEPLOY_VENV_DIR}")"
          if [ ! -d "${DEPLOY_VENV_DIR}" ]; then
            python3 -m venv "${DEPLOY_VENV_DIR}"
          fi

          # Install systemd services from templates.
          CURRENT_USER="$(whoami)"
          KEY_DIR="${DEPLOY_HOME_DIR:-/home/${CURRENT_USER}}/.keys/mumble-bg"
          mkdir -p "${KEY_DIR}"

          for svc_template in mumble-bg-auth mumble-bg-control; do
            TEMPLATE="${DEPLOY_PROJECT_DIR}/deploy/systemd/${svc_template}.service"
            if [ -f "${TEMPLATE}" ]; then
              SERVICE_FILE="/etc/systemd/system/${svc_template}.service"
              sed \
                -e "s|__APP_USER__|${CURRENT_USER}|g" \
                -e "s|__APP_DIR__|${DEPLOY_PROJECT_DIR}|g" \
                -e "s|__ENV_FILE__|${DEPLOY_ENV_FILE}|g" \
                -e "s|__VENV_DIR__|${DEPLOY_VENV_DIR}|g" \
                -e "s|__KEY_DIR__|${KEY_DIR}|g" \
                "${TEMPLATE}" | sudo tee "${SERVICE_FILE}" > /dev/null
              sudo chmod 0644 "${SERVICE_FILE}"
              echo "[bootstrap] Installed systemd service ${svc_template}."
            else
              echo "[bootstrap][WARN] Template not found: ${TEMPLATE}"
            fi
          done
          sudo systemctl daemon-reload
          sudo systemctl enable mumble-bg-auth mumble-bg-control

          # Configure sudoers for service management.
          SUDOERS_FILE="/etc/sudoers.d/mumble-bg"
          if [ ! -f "${SUDOERS_FILE}" ]; then
            sudo tee "${SUDOERS_FILE}" > /dev/null <<SUDOERS
          ${CURRENT_USER} ALL=(ALL) NOPASSWD: /bin/systemctl restart mumble-bg-auth, /bin/systemctl restart mumble-bg-control, /bin/systemctl status mumble-bg-auth, /bin/systemctl status mumble-bg-control, /bin/systemctl is-active mumble-bg-auth, /bin/systemctl is-active mumble-bg-control, /bin/systemctl daemon-reload, /bin/systemctl list-unit-files *, /bin/bash ${DEPLOY_PROJECT_DIR}/deploy/create-db.sh *
          SUDOERS
            sudo chmod 440 "${SUDOERS_FILE}"
            echo "[bootstrap] Configured sudoers."
          fi

          echo "[bootstrap] Bootstrap complete."
          EOF

      - name: Install runtime dependencies
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "DEPLOY_VENV_DIR='${DEPLOY_VENV_DIR}' DEPLOY_PROJECT_DIR='${DEPLOY_PROJECT_DIR}' DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p "$(dirname "${DEPLOY_VENV_DIR}")"
          if [ ! -d "${DEPLOY_VENV_DIR}" ]; then
            python3 -m venv "${DEPLOY_VENV_DIR}"
          fi
          "${DEPLOY_VENV_DIR}/bin/pip" install --quiet -r "${DEPLOY_PROJECT_DIR}/requirements.txt"
          set -a
          source "${DEPLOY_ENV_FILE}"
          set +a

          # Optional suffix trigger: if the configured PSK ends with ":reset",
          # strip the suffix for runtime and reset DB control-key state.
          CONTROL_PSK_RESET_REQUESTED=0
          if [ -n "${MURMUR_CONTROL_PSK:-}" ] && [ "${MURMUR_CONTROL_PSK%:reset}" != "${MURMUR_CONTROL_PSK}" ]; then
            CONTROL_PSK_RESET_REQUESTED=1
            MURMUR_CONTROL_PSK="${MURMUR_CONTROL_PSK%:reset}"
            export MURMUR_CONTROL_PSK
            esc_psk="$(printf '%s' "${MURMUR_CONTROL_PSK}" | sed "s/[\\/&]/\\\\&/g")"
            sed -i "s|^MURMUR_CONTROL_PSK=.*$|MURMUR_CONTROL_PSK='${esc_psk}'|" "${DEPLOY_ENV_FILE}"
          fi

          json_field() {
            local env_var="$1"
            local object_key="$2"
            local field="$3"
            python3 - "$env_var" "$object_key" "$field" <<'PY'
          import json
          import os
          import sys

          env_var = sys.argv[1]
          object_key = sys.argv[2]
          field = sys.argv[3]
          raw = os.environ.get(env_var, '').strip()
          if not raw:
              raise SystemExit(f"{env_var} is not set")

          payload = json.loads(raw)
          if not isinstance(payload, dict):
              raise SystemExit(f"{env_var} must be a JSON object")

          payload = payload.get(object_key)
          if payload is None:
              raise SystemExit(f"{env_var} is missing required object: {object_key}")
          if not isinstance(payload, dict):
              raise SystemExit(f"{env_var}.{object_key} must be a JSON object")

          value = payload.get(field, '')
          if value is None:
              value = ''
          print(value)
          PY
          }

          BG_DATABASE_NAME="$(json_field DATABASES bg database)"
          BG_DATABASE_HOST="$(json_field DATABASES bg host)"
          BG_DATABASE_USER="$(json_field DATABASES bg username)"
          BG_DATABASE_PASSWORD="$(json_field DATABASES bg password)"
          BG_ENGINE_EFFECTIVE="${BG_ENGINE:-postgres}"

          case "$(printf '%s' "${BG_ENGINE_EFFECTIVE}" | tr '[:upper:]' '[:lower:]')" in
            ''|postgres|postgresql|psql)
              BG_ENGINE_EFFECTIVE="postgres"
              ;;
            mysql|maria|mariadb)
              BG_ENGINE_EFFECTIVE="mysql"
              ;;
          esac

          case "${BG_DATABASE_HOST}" in
            127.0.0.1|localhost)
              if [ "$(id -u)" -eq 0 ]; then
                bash "${DEPLOY_PROJECT_DIR}/deploy/create-db.sh" \
                  --engine "${BG_ENGINE_EFFECTIVE}" \
                  --user "${BG_DATABASE_USER}" \
                  --db "${BG_DATABASE_NAME}" \
                  --host "${BG_DATABASE_HOST}" \
                  --pw "${BG_DATABASE_PASSWORD}"
              else
                sudo -n bash "${DEPLOY_PROJECT_DIR}/deploy/create-db.sh" \
                  --engine "${BG_ENGINE_EFFECTIVE}" \
                  --user "${BG_DATABASE_USER}" \
                  --db "${BG_DATABASE_NAME}" \
                  --host "${BG_DATABASE_HOST}" \
                  --pw "${BG_DATABASE_PASSWORD}"
              fi
              ;;
          esac

          BG_RESET_DB_NORMALIZED="$(printf '%s' "${BG_RESET_DB_ON_DEPLOY:-}" | tr '[:upper:]' '[:lower:]')"
          if [ "${BG_RESET_DB_NORMALIZED}" = "1" ] || [ "${BG_RESET_DB_NORMALIZED}" = "true" ] || [ "${BG_RESET_DB_NORMALIZED}" = "yes" ]; then
            if [ "${BG_ENGINE_EFFECTIVE}" != "postgres" ]; then
              echo "[WARN] BG_RESET_DB_ON_DEPLOY is set, but reset flow is only implemented for postgres; skipping."
            elif [ "${BG_DATABASE_HOST}" != "127.0.0.1" ] && [ "${BG_DATABASE_HOST}" != "localhost" ]; then
              echo "[WARN] BG_RESET_DB_ON_DEPLOY is set, but database host is non-local (${BG_DATABASE_HOST}); skipping."
            else
              echo "BG_RESET_DB_ON_DEPLOY enabled: resetting ${BG_DATABASE_NAME} before migrate."
              DB_RESET_DONE=0
              if PGPASSWORD="${BG_DATABASE_PASSWORD}" psql -h "${BG_DATABASE_HOST}" -U "${BG_DATABASE_USER}" -d postgres -Atqc 'SELECT 1' >/dev/null 2>&1; then
                if PGPASSWORD="${BG_DATABASE_PASSWORD}" dropdb --if-exists -h "${BG_DATABASE_HOST}" -U "${BG_DATABASE_USER}" "${BG_DATABASE_NAME}" \
                  && PGPASSWORD="${BG_DATABASE_PASSWORD}" createdb -h "${BG_DATABASE_HOST}" -U "${BG_DATABASE_USER}" -O "${BG_DATABASE_USER}" "${BG_DATABASE_NAME}"; then
                  DB_RESET_DONE=1
                else
                  echo "[WARN] App DB role reset failed; falling back to postgres superuser reset."
                fi
              fi

              if [ "${DB_RESET_DONE}" -eq 0 ]; then
                if [ "$(id -u)" -eq 0 ]; then
                  su - postgres -c "dropdb --if-exists '${BG_DATABASE_NAME}'"
                  su - postgres -c "createdb -O '${BG_DATABASE_USER}' '${BG_DATABASE_NAME}'"
                else
                  sudo -n su - postgres -c "dropdb --if-exists '${BG_DATABASE_NAME}'"
                  sudo -n su - postgres -c "createdb -O '${BG_DATABASE_USER}' '${BG_DATABASE_NAME}'"
                fi
              fi
            fi
          fi

          "${DEPLOY_VENV_DIR}/bin/python" "${DEPLOY_PROJECT_DIR}/manage.py" migrate --noinput
          "${DEPLOY_VENV_DIR}/bin/python" "${DEPLOY_PROJECT_DIR}/manage.py" sync_ice_inventory

          if [ "${CONTROL_PSK_RESET_REQUESTED}" -eq 1 ]; then
            "${DEPLOY_VENV_DIR}/bin/python" "${DEPLOY_PROJECT_DIR}/manage.py" reset_murmur_control_key --yes
          fi
          EOF

      - name: Restart services
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "sudo systemctl restart mumble-bg-auth mumble-bg-control"

      - name: Health check
        run: |
          set -euo pipefail
          sleep 3
          ssh -p "${DEPLOY_TARGET_PORT}" -i ~/.ssh/deploy_key "${DEPLOY_TARGET_USER}@${DEPLOY_TARGET_HOST}" \
            "sudo systemctl is-active mumble-bg-auth && sudo systemctl is-active mumble-bg-control"
